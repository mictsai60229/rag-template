services:
  opensearch:
    image: opensearchproject/opensearch:2.13.0
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      DISABLE_INSTALL_DEMO_CONFIG: "true"
      OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "127.0.0.1:9200:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - rag-network

  backend:
    build:
      context: systems/backend
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      opensearch:
        condition: service_healthy
    networks:
      - rag-network

  importer:
    build:
      context: systems/import
      dockerfile: Dockerfile
    env_file:
      - .env
    volumes:
      - ./tests/source:/data:ro
    command: ["--source", "/data"]
    depends_on:
      opensearch:
        condition: service_healthy
    profiles:
      - import
    networks:
      - rag-network

networks:
  rag-network:
    driver: bridge

volumes:
  opensearch-data:
