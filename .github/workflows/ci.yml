name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff on backend
        run: ruff check systems/backend/src

      - name: Run ruff on import
        run: ruff check systems/import/src

  test-backend:
    name: Test — Backend
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        working-directory: systems/backend
        run: pip install -e ".[dev]"

      - name: Run backend tests
        working-directory: systems/backend
        run: pytest tests/ -v --cov=src

  test-import:
    name: Test — Import Pipeline
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install import dependencies
        working-directory: systems/import
        run: pip install -e ".[dev]"

      - name: Run import tests
        working-directory: systems/import
        run: pytest tests/ -v --cov=src

  build:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs:
      - test-backend
      - test-import
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: systems/backend
          file: systems/backend/Dockerfile
          push: false
          tags: ghcr.io/${{ github.repository_owner }}/rag-backend:${{ github.sha }}

      - name: Build importer image
        uses: docker/build-push-action@v5
        with:
          context: systems/import
          file: systems/import/Dockerfile
          push: false
          tags: ghcr.io/${{ github.repository_owner }}/rag-importer:${{ github.sha }}

  push:
    name: Push to GHCR (release)
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push backend image
        uses: docker/build-push-action@v5
        with:
          context: systems/backend
          file: systems/backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/rag-backend:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/rag-backend:${{ github.ref_name }}

      - name: Push importer image
        uses: docker/build-push-action@v5
        with:
          context: systems/import
          file: systems/import/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/rag-importer:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/rag-importer:${{ github.ref_name }}
