name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check systems/backend/src systems/import/src

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: systems/backend
        run: pip install -e ".[dev]"

      - name: Run tests
        working-directory: systems/backend
        run: pytest tests/ -v --cov=src

  test-import:
    name: Test Import Pipeline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: systems/import
        run: pip install -e ".[dev]"

      - name: Run tests
        working-directory: systems/import
        run: pytest tests/ -v --cov=src

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs:
      - lint
      - test-backend
      - test-import
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: |
          docker build \
            -t ghcr.io/${{ github.repository }}/backend:${{ github.sha }} \
            systems/backend/

      - name: Build importer image
        run: |
          docker build \
            -t ghcr.io/${{ github.repository }}/importer:${{ github.sha }} \
            systems/import/

  push:
    name: Push Docker Images to GHCR
    runs-on: ubuntu-latest
    needs:
      - build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        run: |
          docker build \
            -t ghcr.io/${{ github.repository }}/backend:${{ github.sha }} \
            -t ghcr.io/${{ github.repository }}/backend:${{ github.ref_name }} \
            systems/backend/
          docker push ghcr.io/${{ github.repository }}/backend:${{ github.sha }}
          docker push ghcr.io/${{ github.repository }}/backend:${{ github.ref_name }}

      - name: Build and push importer image
        run: |
          docker build \
            -t ghcr.io/${{ github.repository }}/importer:${{ github.sha }} \
            -t ghcr.io/${{ github.repository }}/importer:${{ github.ref_name }} \
            systems/import/
          docker push ghcr.io/${{ github.repository }}/importer:${{ github.sha }}
          docker push ghcr.io/${{ github.repository }}/importer:${{ github.ref_name }}
